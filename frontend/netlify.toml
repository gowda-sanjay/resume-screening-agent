[build]
  command = "npm run build"
  publish = "dist"

# API requests go directly to the backend via environment variable
# No rewrite needed - the frontend will use the full backend URL from VITE_API_BASE_URL

# Redirect all other routes to index.html for SPA routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  conditions = { Skip = "!has(/:rest/\.)" }

